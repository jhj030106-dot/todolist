<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header-box">
            <h1>Todo List</h1>
        </div>

        <div class="input-box">
            <input type="text" class="js-todo-input" placeholder="할 일을 입력하세요." onkeydown="handleKeyDown(event)">
            <button class="add-btn" onclick="addTodo()">+</button>
            <button class="reset-btn" onclick="resetTodos()">초기화</button>
        </div>

        <div class="js-todo-list list-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
